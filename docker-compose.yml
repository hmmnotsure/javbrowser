services:
  javbrowser:
    build: .
    # If you want to use the prebuilt image instead of building locally:
    # image: ghcr.io/hmmnotsure/javbrowser:latest
    container_name: javbrowser
    ports:
      - "3367:3000"
    environment:
      MEDIA_ROOT: /media
      HOST_PATH: "/path/to/media"
      PORT: 3000
      CONFIG_ROOT: /config
      LOG_LEVEL: warn
    volumes:
      - "/path/to/media:/media"
      - "./config:/config"
